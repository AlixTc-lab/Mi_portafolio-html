<!DOCTYPE html>
<html lang="es"> #
<head>
    <meta charset="UTF-8">
    <title>Mi portafolio</title>

    <style>
        body { /*fondo de la pagina*/
            background: linear-gradient(to right, #4facfe, #e900fe);
            font-family: Arial, sans-serif;
            /*tipo de letra */
            text-align: center;
            /*alineación*/
            margin: 0;
            padding: 0;
        }

        .contenedor { /*contendor de nombre */
            background-color: white;
        /*color de l contenedor*/
            width: 80%;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;/*borde redondo*/

            box-shadow: 0px 4px 10px rgba(0,0,0,0.2); /*sombra */
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <h1>Hola, soy Alitzel</h1>
        <p>Mi portafolio de programación</p>
        <p>Esta es mi primera pagina</p>
        <p> Estudiante de ingenieria de desarollo de software</p>
    </div>
</body>
</html>
